<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ssolar Sergipe - Cadastro</title>
    <link rel="stylesheet" href="login-cadastro.css" />
  </head>
  <body>
    <div class="container">
      <header class="titulo">
        <a href="index.html"
          ><img
            src="Captura de tela 2026-03-11 081816.png"
            alt="Logo Ssolar Sergipe"
            style="height: 100px"
        /></a>
        <h1>Ssolar / Sergipe <br /></h1>
      </header>

      <nav class="menu">
        <a href="index.html">HOME</a>
        <a href="login.html">LOGIN</a>
        <a href="cadastro.html">CADASTRO</a>
        <a href="usuarios.html">USUÁRIOS</a>
      </nav>

      <main style="text-align: center">
        <br />
        <h2>Cadastro de Novo Cliente</h2>
        <br />
        <p>
          Preencha os dados abaixo para criar sua conta e solicitar um
          orçamento.
        </p>
        <br />

        <form id="formCadastro">
          <h3>Dados Pessoais</h3>

          <div>
            <label for="nome">Nome Completo:</label><br />
            <input class="dados" type="text" id="nome" name="nome" required />
          </div>
          <br />

          <div>
            <label for="email">E-mail:</label><br />
            <input
              class="dados"
              type="email"
              id="email"
              name="email"
              required
            />
          </div>
          <br />

          <div>
            <label for="senha">Senha:</label><br />
            <input
              class="dados"
              type="password"
              id="senha"
              name="senha"
              required
            />
          </div>
          <br />

          <div>
            <label for="idade">Idade:</label><br />
            <input
              class="dados"
              type="number"
              id="idade"
              name="idade"
              required
            />
          </div>
          <br />

          <div>
            <label for="telefone">Telefone / WhatsApp:</label><br />
            <input
              class="dados"
              type="tel"
              id="telefone"
              name="telefone"
              placeholder="(XX) XXXXX-XXXX"
              required
            />
          </div>
          <br />

          <div>
            <label for="cidade">Cidade:</label><br />
            <input
              class="dados"
              type="text"
              id="cidade"
              name="cidade"
              required
            />
          </div>
          <br />

          <hr />
          <br />

          <h3>Dados para Orçamento Solar</h3>

          <div>
            <label for="potencia">Potência desejada (em Kw):</label><br />
            <input
              class="dados"
              type="number"
              id="potencia"
              name="potencia"
              step="0.01"
              placeholder="Ex: 500kw"
              required
            />
          </div>
          <br />

          <div>
            <label for="conta_luz"
              >Envie sua Conta de Luz (PDF ou Imagem):</label
            ><br />
            <input
              class="dados"
              type="file"
              id="conta_luz"
              name="conta_luz"
              accept=".pdf, image/png, image/jpeg"
              required
            />
          </div>
          <br />

          <div>
            <label for="rg">Envie seu Documento de Identidade (RG/CNH):</label
            ><br />
            <input
              class="dados"
              type="file"
              id="rg"
              name="rg"
              accept=".pdf, image/png, image/jpeg"
              required
            />
          </div>
          <br />

          <br />
          <button class="enviar" type="submit">Enviar Cadastro</button>
          <br /><br />
        </form>
      </main>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
